tables:
  food:
    description: >
      Any substance consumed by humans for nutrition, taste and/or aroma.
      Contains only foundation foods from the USDA FoodData Central
      (December 2025).
    source: inst/parquet/food.parquet
    primary_key: fdc_id

    fields:
      fdc_id: Unique permanent identifier of the food (e.g. 321358, 321359).
      data_type: Type of food data (always "foundation_food" in this dataset).
      description: Description of the food.
      food_category_id: {foreign_key: food_category.id}
      publication_date: Date when the food was published to FoodData Central.

  food_nutrient:
    description: >
      A nutrient value for a food. Amounts are per 100g of food, in the
      unit defined in the nutrient table.
    source: inst/parquet/food_nutrient.parquet
    primary_key: id

    fields:
      id: Unique permanent identifier (e.g. 2219773, 2219774).
      fdc_id: {foreign_key: food.fdc_id}
      nutrient_id: {foreign_key: nutrient.id}
      amount: Amount of the nutrient per 100g of food.
      data_points: Number of observations on which the value is based.
      derivation_id: ID of the food nutrient derivation technique used to derive the value.
      min: The minimum amount.
      max: The maximum amount.
      median: The median amount.
      footnote: Comments on any unusual aspects of the food nutrient.
      min_year_acquired: Minimum purchase year of all acquisitions used to derive the nutrient value.

  nutrient:
    description: >
      The chemical constituents of a food (e.g. calcium, vitamin E)
      officially recognized as essential to human health.
    source: inst/parquet/nutrient.parquet
    primary_key: id

    fields:
      id: Unique permanent identifier (e.g. 1003, 1004).
      name: Name of the nutrient (e.g. "Protein", "Calcium, Ca", "Vitamin E (alpha-tocopherol)").
      unit_name: The standard unit of measure for the nutrient (e.g. G, MG, UG, KCAL, kJ, IU).
      nutrient_nbr: A unique code identifying a nutrient or food constituent.
      rank: Display rank for ordering nutrients.

  food_portion:
    description: >
      Discrete amounts of food, used to convert from per-100g nutrient
      values to common serving sizes.
    source: inst/parquet/food_portion.parquet
    primary_key: id

    fields:
      id: Unique permanent identifier (e.g. 118804, 118805).
      fdc_id: {foreign_key: food.fdc_id}
      seq_num: The order the measure will be displayed on the released food.
      amount: >
        The number of measure units that comprise the measure
        (e.g. if measure is 3 tsp, the amount is 3).
      measure_unit_id: {foreign_key: measure_unit.id}
      portion_description: Comments that provide more specificity on the measure.
      modifier: Qualifier of the measure (e.g. "chopped", "drained", "whole", "sifted").
      gram_weight: The weight of the measure in grams.
      data_points: The number of observations on which the measure is based.
      footnote: Comments on any unusual aspects of the measure.
      min_year_acquired: Minimum purchase year of all acquisitions used to derive the measure value.

  measure_unit:
    description: Units for measuring quantities of foods.
    source: inst/parquet/measure_unit.parquet
    primary_key: id

    fields:
      id: Unique permanent identifier (e.g. 1000, 1001).
      name: Name of the unit (e.g. "cup", "tablespoon", "teaspoon", "liter").

  food_category:
    description: Foods of defined similarity.
    source: inst/parquet/food_category.parquet
    primary_key: id

    fields:
      id: Unique permanent identifier (e.g. 1, 2, 3).
      code: Food group code (e.g. 100, 200, 900).
      description: Description of the food group (e.g. "Dairy and Egg Products", "Spices and Herbs", "Fruits and Fruit Juices").

relationships:
  - description: Each food has many nutrient values.
    cardinality: one-to-many
    join: food.fdc_id = food_nutrient.fdc_id

  - description: Each food has zero or more portion measures.
    cardinality: one-to-many
    join: food.fdc_id = food_portion.fdc_id

  - description: Each food nutrient value refers to one nutrient.
    cardinality: many-to-one
    join: food_nutrient.nutrient_id = nutrient.id

  - description: Each food portion uses one measure unit.
    cardinality: many-to-one
    join: food_portion.measure_unit_id = measure_unit.id

  - description: Each food belongs to one food category.
    cardinality: many-to-one
    join: food.food_category_id = food_category.id

glossary:
  foundation food: >
    A food whose nutrient and food component values are derived primarily
    by chemical analysis. Foundation data include extensive underlying
    metadata such as the number of samples, the location and dates on
    which samples were obtained, analytical approaches used, and if
    appropriate, cultivar, genotype, and production practices.
  FDC ID: >
    FoodData Central identifier. A unique permanent integer assigned to
    each food in the USDA FoodData Central database.
  nutrient number: >
    A unique code from the USDA Standard Reference (SR) system
    identifying a specific nutrient or food constituent.
  derivation: >
    The technique used to derive a nutrient value, such as analytical
    measurement, calculation, or imputation.
  measure unit: >
    A standard unit used to express a food portion size, such as cup,
    tablespoon, or piece.
